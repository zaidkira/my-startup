<html lang="en" dir="ltr">
<head>

                        "on-background": "#181b23",

                        "secondary-container": "#6cf8bb",
                        "tertiary": "#4c42e2",

                        "primary-fixed-dim": "#aec6ff",
                        "on-error": "#ffffff",

                        "tertiary-fixed-dim": "#c3c0ff",

                        "surface-container-low": "#f2f3fe",
                        "tertiary-container": "#665ffc",
                        "surface-container-high": "#e6e7f3",

                        "on-tertiary-fixed-variant": "#3323cc",

                        "on-secondary-fixed-variant": "#005236",

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #faf9ff; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass-nav { backdrop-filter: blur(20px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        body { min-height: max(884px, 100dvh); }
    </style>
</head>
<body class="text-on-background selection:bg-primary-fixed selection:text-on-primary-fixed">
<script>
    // Simple Auth Guard
    if (!localStorage.getItem('vitalis_token') || localStorage.getItem('vitalis_role') !== 'patient') {
        window.location.href = '/vitalis_auth_portal/code.html';
    }
</script>

<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-950/80 backdrop-blur-xl shadow-[0_10px_30px_rgba(24,27,35,0.04),0_4px_8px_rgba(0,88,195,0.06)] flex justify-between items-center px-6 py-4">
    <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center text-white overflow-hidden shadow-sm">
            <img class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD0I5VHlQq0gpT8_iJ-31lWpPDv1OWJgOt3LobSp4guB2q0TzXQElk-NokiGc5M4i5P7PNnytiYR1P1B68k7fHmxwgo2FQfKYWrwLLPrm-n7KLyJtJ-ZjXS2bX8xN_4KfaDIVwkPUjsTPaQnMrn-Q3OJyZiMOCuFs0q4Ix_pzJ9iOyOw4Ljz0ozqa7Pk_V459BPXUkSKoCu1EcMeapWhYtGJK06ZwWmQnz84AJsqr6W622X-pd3CzF3LHJC0FB5ja6tft6HNKrk2yc"/>
        </div>
        <div>
            <h1 class="font-['Inter'] font-semibold text-lg tracking-tight text-on-surface">Vitalis</h1>
            <p class="text-[10px] text-primary font-bold italic opacity-80 uppercase">Patient Wellness</p>
        </div>
    </div>
    <button class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-slate-50 transition-colors">
        <span class="material-symbols-outlined text-slate-500">notifications</span>
    </button>
</header>

<main class="pt-24 pb-32 px-4 md:px-8 max-w-7xl mx-auto space-y-8">
    <!-- Welcome Hero Section -->
    <section class="relative overflow-hidden rounded-3xl p-8 min-h-[180px] flex flex-col justify-end bg-gradient-to-br from-primary to-primary-container shadow-xl text-white">
        <div class="absolute top-0 right-0 w-64 h-64 bg-white/10 rounded-full -mr-20 -mt-20 blur-3xl"></div>
        <div class="relative z-10">
            <h2 class="text-3xl font-black mb-1">Hello, <span id="patient-hero-name">User</span></h2>
            <p class="text-primary-fixed text-sm font-medium opacity-90 uppercase tracking-widest">Wellness Journey • Day 24</p>
        </div>
    </section>

    <!-- Bento Grid Layout -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        <!-- Vitals Grid -->
        <div class="lg:col-span-8 grid grid-cols-2 md:grid-cols-4 gap-4">
            <!-- Vitals Item 1: Steps -->
            <div class="bg-surface-container-low p-5 rounded-3xl group hover:bg-primary group transition-all duration-300">
                <div class="w-10 h-10 rounded-2xl bg-secondary/10 flex items-center justify-center mb-4 text-secondary group-hover:bg-white/20 group-hover:text-white transition-colors">
                    <span class="material-symbols-outlined">directions_walk</span>
                </div>
                <p class="text-label-md text-slate-500 font-bold uppercase tracking-widest text-[9px] mb-1 group-hover:text-white/70">Steps</p>
                <h3 class="text-2xl font-black text-on-surface group-hover:text-white">8,432</h3>
            </div>
            <!-- Vitals Item 2: Heart Rate -->
            <div class="bg-surface-container-low p-5 rounded-3xl group hover:bg-primary transition-all duration-300">
                <div class="w-10 h-10 rounded-2xl bg-primary/10 flex items-center justify-center mb-4 text-primary group-hover:bg-white/20 group-hover:text-white transition-colors">
                    <span class="material-symbols-outlined">favorite</span>
                </div>
                <p class="text-label-md text-slate-500 font-bold uppercase tracking-widest text-[9px] mb-1 group-hover:text-white/70">BPM</p>
                <h3 class="text-2xl font-black text-on-surface group-hover:text-white">72</h3>
            </div>
            <!-- Vitals Item 3: Sleep -->
            <div class="bg-surface-container-low p-5 rounded-3xl group hover:bg-primary transition-all duration-300">
                <div class="w-10 h-10 rounded-2xl bg-tertiary/10 flex items-center justify-center mb-4 text-tertiary group-hover:bg-white/20 group-hover:text-white transition-colors">
                    <span class="material-symbols-outlined">bedtime</span>
                </div>
                <p class="text-label-md text-slate-500 font-bold uppercase tracking-widest text-[9px] mb-1 group-hover:text-white/70">Hours</p>
                <h3 class="text-2xl font-black text-on-surface group-hover:text-white">7.5</h3>
            </div>
            <!-- Vitals Item 4: Calories -->
            <div class="bg-surface-container-low p-5 rounded-3xl group hover:bg-primary transition-all duration-300">
                <div class="w-10 h-10 rounded-2xl bg-error/10 flex items-center justify-center mb-4 text-error group-hover:bg-white/20 group-hover:text-white transition-colors">
                    <span class="material-symbols-outlined">local_fire_department</span>
                </div>
                <p class="text-label-md text-slate-500 font-bold uppercase tracking-widest text-[9px] mb-1 group-hover:text-white/70">Kcal</p>
                <h3 class="text-2xl font-black text-on-surface group-hover:text-white">420</h3>
            </div>
        </div>

        <!-- Progress Chart -->
        <div class="lg:col-span-4 bg-surface-container-low rounded-3xl p-6 relative overflow-hidden">
            <h3 class="text-title-md font-black text-on-surface mb-4">Wellness Score</h3>
            <div class="flex items-end justify-between h-24 gap-1 px-2">
                <div class="w-full bg-primary/20 rounded-t-full h-[40%]"></div>
                <div class="w-full bg-primary/20 rounded-t-full h-[60%]"></div>
                <div class="w-full bg-primary/20 rounded-t-full h-[55%]"></div>
                <div class="w-full bg-primary/20 rounded-t-full h-[85%]"></div>
                <div class="w-full bg-primary rounded-t-full h-[95%]"></div>
                <div class="w-full bg-primary/20 rounded-t-full h-[70%]"></div>
            </div>
            <div class="mt-6 flex justify-between items-center">
                <span class="text-display-md text-3xl font-black text-primary">92%</span>
                <span class="text-label-sm text-slate-400 font-bold uppercase tracking-widest">Excellent</span>
            </div>
        </div>

        <!-- Medications Section -->
        <div class="lg:col-span-12 space-y-4">
            <div class="flex justify-between items-center px-2">
                <h3 class="text-xl font-bold text-on-surface">Daily Medications</h3>
                <button class="text-primary text-sm font-bold uppercase tracking-widest">View History</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="medications-container">
                <!-- Medications will be loaded here -->
                <div class="text-center p-8 text-slate-500 animate-pulse text-sm font-bold uppercase tracking-widest">Fetching prescription data...</div>
            </div>
        </div>
    </div>
</main>

<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center pb-6 pt-3 px-4 bg-white/80 dark:bg-slate-950/80 backdrop-blur-xl z-50 rounded-t-3xl shadow-[0_-10px_30px_rgba(24,27,35,0.04)] border-t border-slate-100">
    <a class="flex flex-col items-center justify-center text-blue-700 bg-blue-50 rounded-2xl px-5 py-2" href="#">
        <span class="material-symbols-outlined">grid_view</span>
        <span class="text-[11px] font-medium tracking-wide uppercase mt-1">Home</span>
    </a>
    <a class="flex flex-col items-center justify-center text-slate-400 px-5 py-2" href="#">
        <span class="material-symbols-outlined">monitoring</span>
        <span class="text-[11px] font-medium tracking-wide uppercase mt-1">Stats</span>
    </a>
    <a class="flex flex-col items-center justify-center text-slate-400 px-5 py-2" href="#">
        <span class="material-symbols-outlined">person</span>
        <span class="text-[11px] font-medium tracking-wide uppercase mt-1">Me</span>
    </a>
</nav>

<script>
document.addEventListener('DOMContentLoaded', async () => {
    const patientName = localStorage.getItem('vitalis_name') || 'User';
    const heroName = document.getElementById('patient-hero-name');
    if (heroName) heroName.textContent = patientName;

    const token = localStorage.getItem('vitalis_token');
    const API_URL = window.location.hostname === 'localhost' ? 'http://localhost:5000' : '';

    // Fetch Medications
    try {
        const response = await fetch(`${API_URL}/api/medications`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (response.ok) {
            const meds = await response.json();
            const container = document.getElementById('medications-container');
            if (container) {
                container.innerHTML = '';
                meds.forEach(med => {
                    const isTaken = med.isTakenToday;
                    container.innerHTML += `
                        <div class="bg-surface-container-low rounded-[2rem] p-6 shadow-sm flex items-center justify-between group hover:shadow-lg transition-all">
                            <div class="flex items-center gap-4">
                                <div class="w-14 h-14 rounded-2xl bg-white flex items-center justify-center text-primary group-hover:scale-110 transition-transform">
                                    <span class="material-symbols-outlined text-3xl">medication</span>
                                </div>
                                <div>
                                    <h4 class="font-bold text-on-surface text-lg leading-tight">${med.name}</h4>
                                    <p class="text-xs text-slate-500 font-medium">${med.dosage} • ${med.instruction}</p>
                                </div>
                            </div>
                            <button onclick="logMedication('${med._id}', ${!isTaken})" 
                                class="w-12 h-12 rounded-2xl flex items-center justify-center transition-all ${isTaken ? 'bg-secondary text-white' : 'bg-white text-slate-300 ring-1 ring-slate-100 hover:ring-primary hover:text-primary'}">
                                <span class="material-symbols-outlined">${isTaken ? 'check_circle' : 'circle'}</span>
                            </button>
                        </div>
                    `;
                });
            }
        }
    } catch (err) { console.error('Med load fail:', err); }
});

async function logMedication(id, taken) {
    if (!taken) return;
    const token = localStorage.getItem('vitalis_token');
    const API_URL = window.location.hostname === 'localhost' ? 'http://localhost:5000' : '';
    try {
        const res = await fetch(`${API_URL}/api/medications/${id}/log`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }
        });
        if (res.ok) window.location.reload();
    } catch (err) { console.error(err); }
}
</script>
</body>
</html>
