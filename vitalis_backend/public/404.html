<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Vitalis | Page Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #faf9ff; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-slate-800">
    <div class="text-center space-y-6">
        <h1 class="text-9xl font-black text-blue-600 tracking-tighter">404</h1>
        <h2 class="text-2xl font-bold">Oops! Page not found.</h2>
        <p class="text-slate-500 max-w-md mx-auto">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
        <div class="pt-8">
            <a href="/" class="px-8 py-4 bg-blue-600 text-white font-bold rounded-2xl shadow-lg hover:bg-blue-700 transition-colors">Return Home</a>
        </div>
    </div>
</body>
</html>
